version: '3.8'

services:
  rag-api:
    build: .
    container_name: rag-arxiv-assistant
    ports:
      - "8000:8000"  # FastAPI
      - "8501:8501"  # Streamlit
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
    environment:
      - APP_ENV=${APP_ENV:-dev}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY:-}
    command: python -m uvicorn rag_arxiv_qa.src.api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Streamlit service (alternative to API)
  rag-ui:
    build: .
    container_name: rag-streamlit-ui
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
    environment:
      - APP_ENV=${APP_ENV:-dev}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY:-}
    command: streamlit run streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    restart: unless-stopped
    depends_on:
      - rag-api
